name: Deploy HTML App to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Pages artifact
        run: |
          mkdir -p _site
          # fiume.html wird als index.html bereitgestellt
          cp fiume.html _site/index.html
          # Manifest und robots.txt mitnehmen, falls vorhanden
          [ -f public/manifest.json ] && cp public/manifest.json _site/manifest.json || true
          [ -f public/robots.txt ]   && cp public/robots.txt _site/robots.txt     || true
          # Favicon mitnehmen, falls vorhanden
          [ -f public/favicon.ico ]  && cp public/favicon.ico _site/favicon.ico   || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
